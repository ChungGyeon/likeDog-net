<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net | My Profile</title>
    <link rel="stylesheet" href="../../common/css/style.css">
</head>
<body>
<header></header>

<main class="container">
    <!-- Top Bar -->
    <div class="mypage-top-header mt-20" style="border-radius: 20px 20px 0 0;">
        <div class="user-info">
            <div class="avatar-circle"></div>
            <div>
                <div style="font-size: 0.8rem; color: #666;">닉네임</div>
                <div id="top-username" style="font-weight: bold; font-size: 1.2rem;">Username</div>
            </div>
        </div>
        <div class="zenless-close-btn" style="position: static;" onclick="location.href='../home/index.html'">×</div>
    </div>

    <!-- Main Content -->
    <div class="mypage-container" style="margin-top: 0; border-radius: 0 0 30px 30px; border-top: none;">
        <!-- Left Menu -->
        <div class="mypage-left">
            <div class="mypage-profile-img-box" id="profile-img-display" title="클릭하여 프로필 사진 변경"></div>
            <input type="file" id="profile-image-input" accept="image/*" style="display: none;">
            <div class="mypage-menu">
                <button class="mypage-menu-btn" onclick="handleEditProfile()">닉네임 변경</button>
                <button class="mypage-menu-btn" onclick="handleChangePassword()">비밀번호 변경</button>
                <button class="mypage-menu-btn danger" onclick="handleDeleteAccount()">회원탈퇴</button>
            </div>
        </div>

        <!-- Right Activity -->
        <div class="mypage-right">
            <!-- My Posts Section -->
            <div class="mypage-section">
                <div class="mypage-section-header">
                    <h2>내 게시글</h2>
                    <a href="posts.html" class="mypage-view-all">전체보기</a>
                </div>
                <div id="my-posts-list" class="mypage-list">
                    <!-- Posts will be loaded here -->
                </div>
            </div>

            <!-- My Comments Section -->
            <div class="mypage-section" style="border-left: 1px solid #222; padding-left: 30px;">
                <div class="mypage-section-header">
                    <h2>내 댓글</h2>
                    <a href="comments.html" class="mypage-view-all">전체보기</a>
                </div>
                <div id="my-comments-list" class="mypage-list">
                    <!-- Comments will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</main>

<script src="../../common/js/script.js"></script>
<script src="../../common/js/userProfile.js"></script>
</body>
</html>
