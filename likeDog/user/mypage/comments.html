<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net | My Comments</title>
    <link rel="stylesheet" href="../../common/css/style.css">
</head>
<body>
<header></header>

<main class="container">
    <div class="flex justify-between align-center mb-20 mt-20">
        <h1>내 댓글 관리</h1>
        <button class="btn-sm btn-secondary" onclick="location.href='profile.html'">마이페이지로</button>
    </div>

    <div class="table-container">
        <table class="table">
            <thead>
            <tr>
                <th>게시글</th>
                <th>댓글 내용</th>
                <th>날짜</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody id="my-comments-full">
            <!-- Comments will be loaded here -->
            </tbody>
        </table>
    </div>
</main>

<script src="../../common/js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!Auth.isLoggedIn()) return;
        const user = Auth.getCurrentUser();
        const posts = JSON.parse(localStorage.getItem('posts')) || [];
        const comments = JSON.parse(localStorage.getItem('comments')) || [];
        const myComments = comments.filter(c => c.author === user.username);
        const tbody = document.getElementById('my-comments-full');

        tbody.innerHTML = myComments.map(c => {
            const targetPost = posts.find(p => p.id === c.postId);
            return `
                    <tr>
                        <td style="color: #666; font-size: 0.8rem;">\${targetPost ? targetPost.title : '삭제된 게시글'}</td>
                        <td onclick="location.href='../posts/post.html?id=\${c.postId}'" style="cursor:pointer;">\${c.content}</td>
                        <td>\${c.date}</td>
                        <td>
                            <button class="btn-sm btn-del" onclick="deleteComment(\${c.id})">삭제</button>
                        </td>
                    </tr>
                `;
        }).join('') || '<tr><td colspan="4" style="text-align:center; padding: 50px;">작성한 댓글이 없습니다.</td></tr>';

        window.deleteComment = (id) => {
            if (confirm('정말 삭제하시겠습니까?')) {
                const newComments = comments.filter(c => c.id !== id);
                localStorage.setItem('comments', JSON.stringify(newComments));
                location.reload();
            }
        };
    });
</script>
</body>
</html>
