<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net | Post Detail</title>
    <link rel="stylesheet" href="../../common/css/style.css">
    <link rel="stylesheet" href="../../common/css/post.css">
</head><body>
<header></header>

<main class="container">
    <div class="zenless-post-container">
        <div class="zenless-close-btn" onclick="history.back()">×</div>

        <!-- Left Side: Image -->
        <div class="zenless-post-left">
            <div class="zenless-post-top-bar">
                <div class="user-badge">
                    <div class="author-img" style="width: 30px; height: 30px;"></div>
                    <span id="post-author-name">Loading...</span>
                </div>
                <div class="heart-count">👁️ <span id="post-views">0</span></div>
                <div id="like-btn" class="heart-count" style="cursor: pointer; user-select: none; transition: all 0.2s ease;">❤️ <span id="post-likes">0</span></div>
                <button id="report-post-btn" class="btn-secondary" style="width:auto; padding: 5px 15px; margin:0; font-size: 0.8rem; background-color: #555;">신고</button>
            </div>
            <div id="post-image-box" class="zenless-post-img-box"></div>
        </div>

        <!-- Right Side: Content & Comments -->
        <div class="zenless-post-right">
            <div class="zenless-post-header">
                <h1 id="post-title" class="zenless-post-title">Loading...</h1>
            </div>

            <div id="post-content" class="zenless-post-body">
                Loading content...
            </div>

            <div class="zenless-comment-area">
                <div class="flex justify-between align-center mb-20">
                    <h3>의견 수렴</h3>
                    <span id="comment-count" style="color: #666;">0 comments</span>
                </div>

                <div id="comment-list" class="zenless-comment-list">
                    <!-- Comments will be loaded here -->
                </div>

                <div class="comment-form mt-20">
                    <textarea id="comment-input" placeholder="댓글을 입력하세요..." style="width: 100%; height: 80px; padding: 15px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff;"></textarea>
                    <button id="submit-comment" class="btn-primary" style="width: auto; padding: 10px 30px; float: right; margin-top: 10px;">등록</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin/Author Actions -->
    <div id="post-admin-actions" class="post-actions mt-20">
        <!-- Buttons will be injected here -->
    </div>
</main>

<script src="../../common/js/script.js"></script>
<script src="../../common/js/userPost.js"></script>
</body>
</html>
