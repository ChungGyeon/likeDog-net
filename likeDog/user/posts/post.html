<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net | Post Detail</title>
    <link rel="stylesheet" href="../../common/css/style.css">
    <link rel="stylesheet" href="../../common/css/post.css">
</head><body>
<header></header>

<main class="container">
    <div class="zenless-post-container">
        <div class="zenless-close-btn" onclick="history.back()">×</div>

        <!-- Left Side: Image -->
        <div class="zenless-post-left">
            <div class="zenless-post-top-bar">
                <div class="user-badge">
                    <div class="author-img" style="width: 30px; height: 30px;"></div>
                    <span id="post-author-name">Loading...</span>
                </div>
                <div class="heart-count">👁️ <span id="post-views">0</span></div>
                <div id="like-btn" class="heart-count" style="cursor: pointer; user-select: none; transition: all 0.2s ease;">❤️ <span id="post-likes">0</span></div>
                <button id="report-post-btn" class="btn-secondary" style="width:auto; padding: 5px 15px; margin:0; font-size: 0.8rem; background-color: #555;">신고</button>
            </div>
            <div id="post-image-box" class="zenless-post-img-box"></div>
        </div>

        <!-- Right Side: Content & Comments -->
        <div class="zenless-post-right">
            <div class="zenless-post-header">
                <h1 id="post-title" class="zenless-post-title">Loading...</h1>
            </div>

            <div id="post-content" class="zenless-post-body">
                Loading content...
            </div>

            <div class="zenless-comment-area">
                <div class="flex justify-between align-center mb-20">
                    <h3>의견 수렴</h3>
                    <span id="comment-count" style="color: #666;">0 comments</span>
                </div>

                <div id="comment-list" class="zenless-comment-list">
                    <!-- Comments will be loaded here -->
                </div>

                <div class="comment-form mt-20">
                    <textarea id="comment-input" placeholder="댓글을 입력하세요..." style="width: 100%; height: 80px; padding: 15px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff;"></textarea>
                    <button id="submit-comment" class="btn-primary" style="width: auto; padding: 10px 30px; float: right; margin-top: 10px;">등록</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin/Author Actions -->
    <div id="post-admin-actions" class="post-actions mt-20">
        <!-- Buttons will be injected here -->
    </div>
</main>

<script src="../../common/js/script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const postId = parseInt(urlParams.get('id'));
        const posts = JSON.parse(localStorage.getItem('posts')) || [];
        const postIndex = posts.findIndex(p => p.id === postId);

        if (postIndex === -1) {
            alert('존재하지 않는 게시글입니다.');
            location.href = '../boards/list.html';
            return;
        }

        const post = posts[postIndex];
        const currentUser = Auth.getCurrentUser();

        // --- View Count Logic ---
        if (currentUser) {
            post.viewedBy = post.viewedBy || [];
            if (!post.viewedBy.includes(currentUser.username)) {
                post.views++;
                post.viewedBy.push(currentUser.username);
                posts[postIndex] = post; // Update the post in the main array
                localStorage.setItem('posts', JSON.stringify(posts));
            }
        }

        const users = JSON.parse(localStorage.getItem('users')) || [];
        const author = users.find(u => u.username === post.author);
        if (author && author.profileImage) {
            document.querySelector('.author-img').style.backgroundImage = `url('${author.profileImage}')`;
        }

        // --- UI Data Injection ---
        document.getElementById('post-title').textContent = post.title;
        document.getElementById('post-content').textContent = post.content;
        document.getElementById('post-author-name').textContent = post.author;
        document.getElementById('post-views').textContent = post.views;
        document.getElementById('post-likes').textContent = post.likes;
        if (post.image) {
            document.getElementById('post-image-box').style.backgroundImage = `url('${post.image}')`;
        }

        const isAuthor = currentUser && currentUser.username === post.author;
        const isAdmin = Auth.isAdmin();

        if (isAuthor || isAdmin) {
            document.getElementById('post-admin-actions').innerHTML = `
                <a href="edit.html?id=${post.id}" class="btn btn-edit">수정</a>
                <button onclick="handleDelete()" class="btn btn-delete">삭제</button>
            `;
        }

        function renderComments() {
            const comments = JSON.parse(localStorage.getItem('comments')) || [];
            const postComments = comments.filter(c => c.postId === postId);
            const list = document.getElementById('comment-list');
            document.getElementById('comment-count').textContent = `${postComments.length} comments`;
            list.innerHTML = postComments.map((c, index) => {
                const commentAuthor = users.find(u => u.username === c.author);
                const commentAuthorImgStyle = commentAuthor && commentAuthor.profileImage ? `style="background-image: url('${commentAuthor.profileImage}')"` : '';
                return `
                    <div class="zenless-comment-item ${index === 0 ? 'highlight' : ''}">
                        <div class="comment-avatar" ${commentAuthorImgStyle}></div>
                        <div class="comment-info"><div class="author">${c.author}</div><div class="text">${c.content}</div></div>
                        <div class="comment-floor">${index + 1}F</div>
                    </div>`;
            }).join('') || '<p style="color: #666; padding: 20px; text-align: center;">아직 댓글이 없습니다.</p>';
        }
        renderComments();

        document.getElementById('submit-comment').addEventListener('click', () => {
            if (!Auth.isLoggedIn()) { alert('로그인이 필요합니다.'); return; }
            const content = document.getElementById('comment-input').value;
            if (!content) return;
            const comments = JSON.parse(localStorage.getItem('comments')) || [];
            comments.push({ id: Date.now(), postId, author: currentUser.username, content, date: new Date().toLocaleString() });
            localStorage.setItem('comments', JSON.stringify(comments));
            document.getElementById('comment-input').value = '';
            renderComments();
        });

        window.handleDelete = () => {
            if (confirm('정말 삭제하시겠습니까?')) {
                const newPosts = posts.filter(p => p.id !== postId);
                localStorage.setItem('posts', JSON.stringify(newPosts));
                alert('삭제되었습니다.');
                location.href = '../boards/list.html';
            }
        };

        const reportBtn = document.getElementById('report-post-btn');
        if (reportBtn) {
            reportBtn.addEventListener('click', () => {
                if (!Auth.isLoggedIn()) { alert('신고 기능은 로그인이 필요합니다.'); location.href = '/likeDog/user/auth/login.html'; return; }
                const reason = prompt('이 게시글을 신고하는 사유를 입력해주세요.');
                if (reason === null) return;
                if (!reason.trim()) { alert('신고 사유를 입력해야 합니다.'); return; }
                const reports = JSON.parse(localStorage.getItem('reports')) || [];
                reports.push({
                    reportId: Date.now(),
                    reporter: { username: currentUser.username, id: currentUser.id },
                    reportedPost: { id: post.id, title: post.title },
                    reportedAuthor: { username: post.author },
                    reason: reason, status: 'pending', reportDate: new Date().toISOString().split('T')[0]
                });
                localStorage.setItem('reports', JSON.stringify(reports));
                alert('신고가 정상적으로 접수되었습니다.');
            });
        }

        const likeBtn = document.getElementById('like-btn');
        const postLikesSpan = document.getElementById('post-likes');
        const updateLikeButtonVisual = () => {
            if (!currentUser) return;
            post.likedBy = post.likedBy || [];
            if (post.likedBy.includes(currentUser.username)) {
                likeBtn.style.color = 'var(--danger-color)';
                likeBtn.style.transform = 'scale(1.1)';
            } else {
                likeBtn.style.color = '';
                likeBtn.style.transform = '';
            }
        };
        likeBtn.addEventListener('click', () => {
            if (!Auth.isLoggedIn()) { alert('로그인이 필요합니다.'); return; }
            const allPosts = JSON.parse(localStorage.getItem('posts')) || [];
            const postIndex = allPosts.findIndex(p => p.id === postId);
            if (postIndex === -1) return;
            const targetPost = allPosts[postIndex];
            targetPost.likedBy = targetPost.likedBy || [];
            const userIndexInLikedBy = targetPost.likedBy.indexOf(currentUser.username);
            if (userIndexInLikedBy > -1) {
                targetPost.likes--;
                targetPost.likedBy.splice(userIndexInLikedBy, 1);
            } else {
                targetPost.likes++;
                targetPost.likedBy.push(currentUser.username);
            }
            localStorage.setItem('posts', JSON.stringify(allPosts));
            post.likes = targetPost.likes;
            post.likedBy = targetPost.likedBy;
            postLikesSpan.textContent = post.likes;
            updateLikeButtonVisual();
        });
        updateLikeButtonVisual();
    });
</script>
</body>
</html>
