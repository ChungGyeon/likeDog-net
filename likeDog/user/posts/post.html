<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net | Post Detail</title>
    <link rel="stylesheet" href="../../common/css/style.css">
</head>
<body>
<header></header>

<main class="container">
    <div class="zenless-post-container">
        <div class="zenless-close-btn" onclick="location.href='../boards/list.html'">×</div>

        <!-- Left Side: Image -->
        <div class="zenless-post-left">
            <div class="zenless-post-top-bar">
                <div class="user-badge">
                    <div class="author-img" style="width: 30px; height: 30px;"></div>
                    <span id="post-author-name">Loading...</span>
                </div>
                <div class="heart-count">❤️ <span id="post-likes">0</span></div>
            </div>
            <div id="post-image-box" class="zenless-post-img-box"></div>
        </div>

        <!-- Right Side: Content & Comments -->
        <div class="zenless-post-right">
            <div class="zenless-post-header">
                <h1 id="post-title" class="zenless-post-title">Loading...</h1>
            </div>

            <div id="post-content" class="zenless-post-body">
                Loading content...
            </div>

            <div class="zenless-comment-area">
                <div class="flex justify-between align-center mb-20">
                    <h3>의견 수렴</h3>
                    <span id="comment-count" style="color: #666;">0 comments</span>
                </div>

                <div id="comment-list" class="zenless-comment-list">
                    <!-- Comments will be loaded here -->
                </div>

                <div class="comment-form mt-20">
                    <textarea id="comment-input" placeholder="댓글을 입력하세요..." style="width: 100%; height: 80px; padding: 15px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff;"></textarea>
                    <button id="submit-comment" class="btn-primary" style="width: auto; padding: 10px 30px; float: right; margin-top: 10px;">등록</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin/Author Actions -->
    <div id="post-admin-actions" class="mt-20 flex gap-10">
        <!-- Buttons will be injected here -->
    </div>
</main>

<script src="../../common/js/script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const postId = parseInt(urlParams.get('id'));
        const posts = JSON.parse(localStorage.getItem('posts')) || [];
        const post = posts.find(p => p.id === postId);

        if (!post) {
            alert('존재하지 않는 게시글입니다.');
            location.href = '../boards/list.html';
            return;
        }

        // UI Data Injection
        document.getElementById('post-title').textContent = post.title;
        document.getElementById('post-content').textContent = post.content;
        document.getElementById('post-author-name').textContent = post.author;
        document.getElementById('post-likes').textContent = post.likes;
        if (post.image) {
            document.getElementById('post-image-box').style.backgroundImage = `url('${post.image}')`;
        }

        const currentUser = Auth.getCurrentUser();
        const isAuthor = currentUser && currentUser.username === post.author;
        const isAdmin = Auth.isAdmin();

        if (isAuthor || isAdmin) {
            document.getElementById('post-admin-actions').innerHTML = `
                    <button class="btn-sm btn-edit" onclick="location.href='edit.html?id=${post.id}'">게시글 수정</button>
                    <button class="btn-sm btn-del" onclick="handleDelete()">게시글 삭제</button>
                `;
        }

        // Comments Logic
        function renderComments() {
            const comments = JSON.parse(localStorage.getItem('comments')) || [];
            const postComments = comments.filter(c => c.postId === postId);
            const list = document.getElementById('comment-list');
            document.getElementById('comment-count').textContent = `${postComments.length} comments`;

            list.innerHTML = postComments.map((c, index) => `
                    <div class="zenless-comment-item ${index === 0 ? 'highlight' : ''}">
                        <div class="comment-avatar"></div>
                        <div class="comment-info">
                            <div class="author">${c.author}</div>
                            <div class="text">${c.content}</div>
                        </div>
                        <div class="comment-floor">${index + 1}F</div>
                    </div>
                `).join('') || '<p style="color: #666; padding: 20px; text-align: center;">아직 댓글이 없습니다.</p>';
        }

        renderComments();

        document.getElementById('submit-comment').addEventListener('click', () => {
            if (!Auth.isLoggedIn()) {
                alert('로그인이 필요합니다.');
                return;
            }
            const content = document.getElementById('comment-input').value;
            if (!content) return;

            const comments = JSON.parse(localStorage.getItem('comments')) || [];
            comments.push({
                id: Date.now(),
                postId: postId,
                author: currentUser.username,
                content: content,
                date: new Date().toLocaleString()
            });
            localStorage.setItem('comments', JSON.stringify(comments));
            document.getElementById('comment-input').value = '';
            renderComments();
        });

        window.handleDelete = () => {
            if (confirm('정말 삭제하시겠습니까?')) {
                const newPosts = posts.filter(p => p.id !== postId);
                localStorage.setItem('posts', JSON.stringify(newPosts));
                alert('삭제되었습니다.');
                location.href = '../boards/list.html';
            }
        };
    });
</script>
</body>
</html>
