<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net | Board</title>
    <link rel="stylesheet" href="/likeDog/common/css/style.css">
</head>
<body class="body-with-bg">
<header></header>

<main class="container" id="board-page-container">
    <div class="flex justify-between align-center mb-20">
        <h1 id="board-page-title">게시판</h1>
        <div class="flex gap-10">
            <select id="category-filter" style="padding: 10px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px;">
                <option value="all">전체 카테고리</option>
                <option value="잡담">잡담</option>
                <option value="법률">법률</option>
                <option value="의뢰">의뢰</option>
            </select>
            <button id="write-btn" class="btn-primary" style="width: auto; padding: 10px 20px; margin-top: 0;">글쓰기</button>
        </div>
    </div>

    <div class="card-grid" id="post-grid">
        <!-- Posts will be loaded here -->
    </div>
</main>

<script src="/likeDog/common/js/script.js"></script>
</body>
</html>
