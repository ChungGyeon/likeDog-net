<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net | Find Password</title>
    <!-- 공용 스타일 -->
    <link rel="stylesheet" href="/likeDog/common/css/style.css">
    <!-- 전용 스타일 -->
    <link rel="stylesheet" href="/likeDog/common/css/find-password.css">
</head>
<body>
<header></header>

<main class="container">
    <div class="form-container find-pw-container">
        <h1 class="find-pw-title">Find Password</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">가입하신 아이디를 입력하시면 비밀번호를 알려드립니다.</p>

        <form id="find-pw-form">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" placeholder="아이디를 입력하세요" required>
            </div>

            <button type="submit" class="btn-primary">비밀번호 찾기</button>

            <div id="result-box" class="result-box">
                <p style="color: var(--text-secondary); font-size: 0.9rem;">회원님의 비밀번호는 다음과 같습니다:</p>
                <div id="pw-display" class="pw-display">********</div>
            </div>

            <div class="flex gap-10 mt-20">
                <button type="button" onclick="location.href='login.html'" class="btn-secondary" style="flex: 1;">로그인하러 가기</button>
                <button type="button" onclick="location.href='signup.html'" class="btn-secondary" style="flex: 1;">회원가입</button>
            </div>
        </form>
    </div>
</main>

<!-- 공용 스크립트 -->
<script src="/likeDog/common/js/script.js"></script>
<!-- 전용 스크립트 -->
<script src="/likeDog/common/js/find-password.js"></script>
</body>
</html>
