<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net | Login</title>
    <link rel="stylesheet" href="../../common/css/style.css">
</head>
<body>
<header></header>

<div class="form-container">
    <h2>LOGIN</h2>
    <form id="login-form">
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="username" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit" class="btn-primary">로그인</button>
        <button type="button" onclick="location.href='signup.html'" class="btn-secondary">회원가입</button>
    </form>
    <div class="form-footer">
        <a href="find-password.html">비밀번호를 잊으셨나요?</a>
    </div>
    <div style="margin-top: 20px; font-size: 0.8rem; color: #666; text-align: center;">
        테스트 계정: admin / user1 (비번 무관)
    </div>
</div>

<script src="../../common/js/script.js"></script>
<script src="../../common/js/login.js"></script>
</body>
</html>
