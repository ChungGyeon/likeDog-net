<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>likeDog-Net Admin | Dashboard</title>
    <link rel="stylesheet" href="../../common/css/style.css">
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <div class="logo">likeDog ADMIN</div>
        <ul class="sidebar-menu">
            <li><a href="index.html" class="active">대시보드</a></li>
            <li><a href="../users/list.html">회원 관리</a></li>
            <li><a href="../boards/list.html">게시판 관리</a></li>
            <li><a href="../reports/list.html">신고 처리</a></li>
        </ul>
        <div style="margin-top: auto;">
            <a href="../../user/home/index.html" class="btn-secondary" style="display: block; text-align: center;">사용자 홈으로</a>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <h1>Dashboard</h1>
            <button id="reset-data-btn" class="btn-secondary" style="background-color: var(--danger-color); color: white; width: auto; padding: 10px 20px; margin: 0;">데이터 초기화</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">전체 회원</div>
                <div class="value" id="stat-users">0</div>
            </div>
            <div class="stat-card">
                <div class="label">전체 게시글</div>
                <div class="value" id="stat-posts">0</div>
            </div>
            <div class="stat-card">
                <div class="label">미처리 신고</div>
                <div class="value" id="stat-reports" style="color: var(--danger-color);">0</div>
            </div>
            <div class="stat-card">
                <div class="label">오늘 방문자</div>
                <div class="value">1,284</div>
            </div>
        </div>

        <div class="table-container">
            <div style="padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h3>최근 신고 내역</h3>
                <a href="../reports/list.html" class="text-accent">전체보기</a>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>신고 대상</th>
                    <th>사유</th>
                    <th>신고자</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody id="recent-reports">
                <!-- Reports will be loaded here -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // This script was moved to common/js/dashboard.js, but for this request, we modify it here.
        // A better practice would be to link to the external JS file.
        const Auth = window.Auth || { isAdmin: () => true }; // Fallback for Auth object

        if (!Auth.isAdmin()) {
            alert('관리자 권한이 없습니다.');
            location.href = '../../user/home/index.html';
            return;
        }

        // --- Data Reset Logic ---
        const resetBtn = document.getElementById('reset-data-btn');
        if(resetBtn) {
            resetBtn.addEventListener('click', () => {
                if (confirm('정말로 모든 데이터를 초기화하시겠습니까? 저장된 모든 게시글, 사용자, 게시판 등이 삭제되고 예시 데이터로 대체됩니다.')) {
                    localStorage.clear();
                    alert('데이터가 초기화되었습니다. 페이지를 새로고침합니다.');
                    location.reload();
                }
            });
        }

        const users = JSON.parse(localStorage.getItem('users')) || [];
        const posts = JSON.parse(localStorage.getItem('posts')) || [];
        const reports = JSON.parse(localStorage.getItem('reports')) || [];

        // Update stat cards
        document.getElementById('stat-users').textContent = users.length;
        document.getElementById('stat-posts').textContent = posts.length;
        document.getElementById('stat-reports').textContent = reports.filter(r => r.status === 'pending').length;

        // Get last 10 reports and reverse to show newest first
        const recentReports = reports.slice(-10).reverse();
        const tbody = document.getElementById('recent-reports');

        if (recentReports.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px;">최근 신고 내역이 없습니다.</td></tr>';
        } else {
            tbody.innerHTML = recentReports.map(r => {
                const isPending = r.status === 'pending';
                return `
                    <tr>
                        <td>${r.reportId}</td>
                        <td><a href="/likeDog/user/posts/post.html?id=${r.reportedPost.id}" target="_blank" style="text-decoration: underline;">${r.reportedPost.title}</a></td>
                        <td title="${r.reason}" style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${r.reason}</td>
                        <td>${r.reporter.username}</td>
                        <td><span class="${isPending ? 'text-danger' : 'text-success'}">${r.status}</span></td>
                    </tr>
                `;
            }).join('');
        }
    });
</script>
</body>
</html>
